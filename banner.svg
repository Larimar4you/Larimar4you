<svg width="100%" height="300" viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg">

  <!-- Фон -->
  <defs>
    <linearGradient id="space" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050716"/>
      <stop offset="100%" stop-color="#1b0f3b"/>
    </linearGradient>

    <radialGradient id="nebula1">
      <stop offset="0%" stop-color="#7f5cff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#7f5cff" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="nebula2">
      <stop offset="0%" stop-color="#ff6fb5" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#ff6fb5" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="900" height="300" fill="url(#space)" />

  <!-- Туманности -->
  <g opacity="0.55">
    <ellipse cx="180" cy="210" rx="190" ry="115" fill="url(#nebula1)">
      <animate attributeName="cx" values="180;230;180" dur="18s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="620" cy="110" rx="210" ry="120" fill="url(#nebula2)">
      <animate attributeName="cx" values="620;580;620" dur="22s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <!-- Звёзды -->
  <g>
    <circle cx="120" cy="40" r="2" fill="white" opacity="0.9">
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="320" cy="90" r="1.8" fill="white" opacity="0.9">
      <animate attributeName="opacity" values="1;0.2;1" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="540" cy="50" r="2.2" fill="white" opacity="0.9">
      <animate attributeName="opacity" values="1;0.4;1" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="820" cy="40" r="1.6" fill="white" opacity="0.8">
      <animate attributeName="opacity" values="1;0.1;1" dur="2.8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Комета -->
  <g>
    <line x1="-100" y1="30" x2="-40" y2="50" stroke="#9be7ff" stroke-width="3" stroke-linecap="round">
      <animate attributeName="x1" from="-100" to="1000" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="x2" from="-40" to="1060" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="y1" from="30" to="140" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="y2" from="50" to="160" dur="6s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- Полумесяц + элегантный кот -->
  <g transform="translate(690, 80)">
    <!-- Полумесяц -->
    <circle cx="0" cy="80" r="70" fill="#f7f4c8" opacity="0.9"/>
    <circle cx="18" cy="70" r="70" fill="#050716"/>

    <!-- Силуэт кошки -->
    <g fill="#ffffff">
      <!-- Тело -->
      <ellipse cx="-10" cy="90" rx="16" ry="24"/>
      <!-- Голова -->
      <circle cx="-10" cy="65" r="11"/>
      <!-- Ушки -->
      <polygon points="-18,60 -23,50 -13,55"/>
      <polygon points="-2,60 3,50 -7,55"/>
      <!-- Хвост -->
      <path d="M 0 105 Q 20 115 22 135" stroke="#ffffff" stroke-width="4" fill="none" stroke-linecap="round">
        <animate attributeName="d"
          dur="2.4s"
          repeatCount="indefinite"
          values="
            M 0 105 Q 20 115 22 135;
            M 0 105 Q 26 120 24 138;
            M 0 105 Q 20 115 22 135
          "/>
      </path>
      <!-- Лапы -->
      <path d="M -18 100 Q -25 108 -30 112" stroke="#ffffff" stroke-width="4" fill="none" stroke-linecap="round"/>
      <path d="M -5 100 Q -10 108 -15 112" stroke="#ffffff" stroke-width="4" fill="none" stroke-linecap="round"/>
    </g>

    <!-- Удочка -->
    <g stroke="#c0c0c0" stroke-width="2">
      <line x1="-5" y1="70" x2="40" y2="-10"/>
      <line x1="40" y1="-10" x2="40" y2="70"/>
    </g>

    <!-- Планеты-наживки -->
    <g transform="translate(40, 10)">
      <g>
        <circle cx="0" cy="-30" r="10" fill="#4fd1ff"/>
        <circle cx="0" cy="-30" r="4" fill="#7ff0ff" opacity="0.9"/>
      </g>
      <g>
        <circle cx="0" cy="10" r="8" fill="#ff6fb5"/>
        <circle cx="0" cy="10" r="3" fill="#ffd1ec" opacity="0.9"/>
      </g>
      <g>
        <circle cx="0" cy="45" r="11" fill="#f9c86b"/>
        <circle cx="0" cy="45" r="4" fill="#fff3cf" opacity="0.9"/>
        <animateTransform attributeName="transform"
          type="translate"
          values="0,0; 2,3; 0,0; -2,2; 0,0"
          dur="3s"
          repeatCount="indefinite"/>
      </g>
    </g>
  </g>

  <!-- Текст -->
  <text x="70" y="150" fill="#ffffff" font-size="42" font-family="Verdana" opacity="0.95">
    Lara Kosta — AI × Fullstack
  </text>

  <text x="70" y="195" fill="#c7c7ff" font-size="26" font-family="Verdana" opacity="0.85">
    Coding in space
  </text>

</svg>
<svg width="100%" height="300" viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg">

  <!-- Фон -->
  <defs>
    <linearGradient id="space" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050716"/>
      <stop offset="100%" stop-color="#1b0f3b"/>
    </linearGradient>

    <radialGradient id="nebula1">
      <stop offset="0%" stop-color="#7f5cff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#7f5cff" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="nebula2">
      <stop offset="0%" stop-color="#ff6fb5" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#ff6fb5" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="900" height="300" fill="url(#space)" />

  <!-- Туманности -->
  <g opacity="0.55">
    <ellipse cx="170" cy="210" rx="180" ry="110" fill="url(#nebula1)">
      <animate attributeName="cx" values="170;220;170" dur="18s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="600" cy="110" rx="200" ry="115" fill="url(#nebula2)">
      <animate attributeName="cx" values="600;560;600" dur="22s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <!-- Звёзды -->
  <g>
    <circle cx="110" cy="40" r="2" fill="white" opacity="0.9">
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="300" cy="90" r="1.8" fill="white" opacity="0.9">
      <animate attributeName="opacity" values="1;0.2;1" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="520" cy="50" r="2.2" fill="white" opacity="0.9">
      <animate attributeName="opacity" values="1;0.4;1" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="810" cy="40" r="1.6" fill="white" opacity="0.8">
      <animate attributeName="opacity" values="1;0.1;1" dur="2.8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Комета -->
  <g>
    <line x1="-100" y1="30" x2="-40" y2="50" stroke="#9be7ff" stroke-width="3" stroke-linecap="round">
      <animate attributeName="x1" from="-100" to="1000" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="x2" from="-40" to="1060" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="y1" from="30" to="140" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="y2" from="50" to="160" dur="6s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- Полумесяц + изящный кот -->
  <g transform="translate(690, 80)">
    <!-- Полумесяц -->
    <circle cx="0" cy="80" r="68" fill="#f7f4c8" opacity="0.9"/>
    <circle cx="20" cy="70" r="68" fill="#050716"/>

    <!-- Силуэт кошки (минималистичный) -->
    <g fill="#ffffff">
      <!-- Тело -->
      <ellipse cx="-8" cy="90" rx="13" ry="23"/>
      <!-- Голова -->
      <circle cx="-8" cy="66" r="10"/>
      <!-- Ушки -->
      <polygon points="-15,62 -20,52 -10,57"/>
      <polygon points="-1,62 4,52 -6,57"/>
      <!-- Хвост -->
      <path d="M 2 100 Q 22 110 24 132" stroke="#ffffff" stroke-width="3.2" fill="none" stroke-linecap="round">
        <animate attributeName="d"
          dur="2.6s"
          repeatCount="indefinite"
          values="
            M 2 100 Q 22 110 24 132;
            M 2 100 Q 28 118 26 136;
            M 2 100 Q 22 110 24 132
          "/>
      </path>
      <!-- Линия спины/посадки на край полумесяца -->
      <path d="M -18 100 Q -24 108 -30 112" stroke="#ffffff" stroke-width="3" fill="none" stroke-linecap="round"/>
    </g>

    <!-- Удочка -->
    <g stroke="#c0c0c0" stroke-width="2">
      <line x1="-4" y1="68" x2="42" y2="-8"/>
      <line x1="42" y1="-8" x2="42" y2="68"/>
    </g>

    <!-- Планеты-наживки -->
    <g transform="translate(42, 8)">
      <g>
        <circle cx="0" cy="-28" r="9" fill="#4fd1ff"/>
        <circle cx="0" cy="-28" r="4" fill="#7ff0ff" opacity="0.9"/>
      </g>
      <g>
        <circle cx="0" cy="8" r="7" fill="#ff6fb5"/>
        <circle cx="0" cy="8" r="3" fill="#ffd1ec" opacity="0.9"/>
      </g>
      <g>
        <circle cx="0" cy="40" r="10" fill="#f9c86b"/>
        <circle cx="0" cy="40" r="4" fill="#fff3cf" opacity="0.9"/>
        <animateTransform attributeName="transform"
          type="translate"
          values="0,0; 2,3; 0,0; -2,2; 0,0"
          dur="3s"
          repeatCount="indefinite"/>
      </g>
    </g>
  </g>

  <!-- Текст (сдвинут левее и короче по ширине) -->
  <text x="50" y="150" fill="#ffffff" font-size="38" font-family="Verdana" opacity="0.95">
    Lara Kosta — AI × Fullstack
  </text>

  <text x="50" y="192" fill="#c7c7ff" font-size="24" font-family="Verdana" opacity="0.85">
    Coding in space
  </text>

</svg>

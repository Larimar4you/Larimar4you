<svg width="500" height="90" xmlns="http://www.w3.org/2000/svg">

  <!-- Теxt — 1st LAYOUT -->
  <style>
    .title {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 32px; /* больше, чем coding in space */
      font-weight: 400; /* как coding in space */
      fill: #c7c7ff;
    }
    @keyframes slide {
      from { transform: translateX(-120%); }
      to   { transform: translateX(0); }
    }
  </style>

  <text id="title" x="20" y="70" class="text">Hi there!!!</text>

  <style>
     .hand {
      transform-origin: 120px 35px;
      animation: wave 3s ease-in-out;
      animation-iteration-count: 1;
      animation-delay: 1.4s; 
      opacity: 0; animation-fill-mode: forwards;
    }
    @keyframes wave {
        0% { opacity: 0; transform: rotate(0deg); }
        5% { opacity: 1; }

        10%  { transform: rotate(-6deg); }
        15%  { transform: rotate(12deg); }
        20%  { transform: rotate(0deg); }   /* end of 1st cycle */

        25%  { transform: rotate(20deg); }
        30%  { transform: rotate(-10deg); }
        35%  { transform: rotate(20deg); }  /* end of 2nd cycle */
           
        40%  { transform: rotate(0deg); }

        45% { transform: rotate(12deg); } 
        50% { transform: rotate(-6deg); } 
        55% { transform: rotate(12deg); } 
        60% { transform: rotate(0deg); }

        70%  { transform: rotate(0deg); }   /* pausa */

        75%  { transform: rotate(20deg); }
        80%  { transform: rotate(-10deg); }
        85%  { transform: rotate(20deg); }
        90%  { transform: rotate(0deg); }   /*end of 3d cycle*/

        95%  { transform: rotate(20deg); }
        100% { transform: rotate(0deg); }   /* end og 4th cycle */
      }
  </style>

  <text x="300" y="70" font-size="50" class="hand">👋</text>

</svg>

